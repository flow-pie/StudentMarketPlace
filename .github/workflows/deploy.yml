name: Build and Deploy to Azure

on:
  push:
    branches: [ release ]
  pull_request:
    branches: [ release ]

env:
  REGISTRY: ghcr.io
  #  IMAGE_NAME: "${{ github.repository_owner }}/api-core"
  IMAGE_NAME: ${{ github.repository_owner | toLowerCase() }}/StudentMarketPlace
  DOCKERFILE_PATH: API-Core/Dockerfile
  CONTEXT: API-Core

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        id: build-push
        uses: docker/build-push-action@v5
        with:
          context: ${{ env.CONTEXT }}
          file: ${{ env.DOCKERFILE_PATH }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          images: '${{ steps.build-push.outputs.digest }}'

      - name: Configure environment variables
        uses: azure/appservice-settings@v1
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_PUBLISH_PROFILE }}
          app-settings-json: |
            [
              {
                "name": "DATABASE_URL",
                "value": "${{ secrets.DATABASE_URL }}",
                "slotSetting": false
              },
              {
                "name": "JWT_SECRET_KEY",
                "value": "${{ secrets.JWT_SECRET_KEY }}",
                "slotSetting": false
              },
              {
                "name": "PYTHONPATH",
                "value": "/home/site/wwwroot",
                "slotSetting": false
              },
              {
                "name": "WEBSITES_PORT",
                "value": "5000",
                "slotSetting": false
              }
            ]