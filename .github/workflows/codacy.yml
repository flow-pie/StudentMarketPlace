name: Codacy Security Scan

on:
  push:
    branches: [ "dev", "release", "protect_release_branch" ]
  pull_request:
    branches: [ "dev", "release" ]
  schedule:
    - cron: '19 10 * * 6'

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  codacy-security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Codacy CLI
        run: |
          curl -Ls https://github.com/codacy/codacy-analysis-cli/releases/latest/download/codacy-analysis-cli-linux-amd64 > codacy-analysis-cli
          chmod +x codacy-analysis-cli
          sudo mv codacy-analysis-cli /usr/local/bin/

      - name: Run Codacy Analysis CLI inside API-Core
        run: |
          cd API-Core
          codacy-analysis-cli analyze \
            --project-token ${{ secrets.CODACY_PROJECT_TOKEN }} \
            --verbose \
            --output results.sarif \
            --format sarif \
            --gh-code-scanning-compat true \
            --max-allowed-issues 2147483647

      - name: Upload SARIF results file
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: API-Core/results.sarif
